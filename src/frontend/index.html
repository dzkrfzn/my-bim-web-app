<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My BIM Web App</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #fileInput {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <input type="file" id="fileInput" accept=".ifc" />
    <canvas id="glCanvas"></canvas>

    <script type="module">
      import { Engine } from "../core/engine/index.js";

      const canvas = document.getElementById("glCanvas");
      const engine = new Engine(canvas);

      document
        .getElementById("fileInput")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (file && file.name.endsWith(".ifc")) {
            console.log("Memulai loading file:", file.name);
            await engine.loadIFC(file);
          } else {
            alert("Silakan pilih file IFC yang valid.");
          }
        });
    </script>
  </body>
</html>
