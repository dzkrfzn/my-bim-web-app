<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My BIM Web App</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #metadata {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px;
        font-family: sans-serif;
        font-size: 12px;
        max-width: 300px;
        max-height: 90vh;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <input type="file" id="fileInput" accept=".ifc" />
    <canvas id="glCanvas"></canvas>
    <div id="metadata"></div>

    <script type="module">
      import { Engine } from "../core/engine/index.js";

      const canvas = document.getElementById("glCanvas");
      const engine = new Engine(canvas);
      const metadataDiv = document.getElementById("metadata");

      document
        .getElementById("fileInput")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (file && file.name.endsWith(".ifc")) {
            console.log("Memulai loading file:", file.name);
            await engine.loadIFC(file);
          } else {
            alert("Silakan pilih file IFC yang valid.");
          }
        });
    </script>
  </body>
</html>
